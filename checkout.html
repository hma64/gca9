    </div>
  </div>

      <button class="menu-btn" id="menuBtn" type="button" aria-label="Menu"><span></span></button>

        </li>

          <button type="button" class="lang-toggle" id="langToggleBtn">Français</button>
          <div class="lang-menu" id="langMenu">
            <button type="button" class="lang-option" data-lang="fr" id="langOptionFr">Français</button>
            <button type="button" class="lang-option" data-lang="ar" id="langOptionAr">العربية</button>
          </div>
        </div>
        <button class="wishlist-nav-btn" id="openWishlistBtn" type="button" aria-label="Favoris">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>

        </a>
      </div>
    </div>
  </header>

  <main class="checkout-page container">
    <h1 class="section-title" id="pageTitle" style="margin-bottom: 8px">Valider mes achats</h1>
    <p class="section-subtitle" id="pageSub" style="margin-bottom: 24px"></p>

    <div class="checkout-grid">
      <div class="checkout-card">
        <h2 style="margin-bottom: 12px; font-size: 1.1rem" id="recapTitle">Récapitulatif</h2>
        <div id="cartReview"></div>
      </div>
      <div>
        <form id="checkoutForm" class="checkout-card" style="background: #fff">
          <div class="field">
            <label for="firstName" id="labelFirst">Prénom</label>
            <input id="firstName" name="firstName" type="text" autocomplete="given-name" required />
          </div>
          <div class="field">
            <label for="lastName" id="labelLast">Nom</label>
            <input id="lastName" name="lastName" type="text" autocomplete="family-name" required />
          </div>
          <div class="field">
            <label for="phone" id="labelPhone">Téléphone</label>
            <input id="phone" name="phone" type="tel" inputmode="numeric" autocomplete="tel" required />
          </div>
          <div class="field">
            <label for="address" id="labelAddress">Adresse complète</label>
            <textarea id="address" name="address" required></textarea>
          </div>
          <div class="field">
            <label for="addressExtra" id="labelExtra">Complément d'adresse</label>
            <textarea id="addressExtra" name="addressExtra"></textarea>
          </div>
          <div class="field">
            <label for="governorateSelect" id="labelGov">Gouvernorat</label>
            <select id="governorateSelect" name="governorate" required>
              <option value="" id="govPlaceholder">Choisir…</option>
            </select>
          </div>

          <div class="checkout-summary-row">
            <span id="lblSubtotal">Prix total articles</span>
            <span id="subtotalEl">0 DT</span>
          </div>
          <div class="checkout-summary-row">
            <span id="lblShip">Livraison</span>
            <span id="shippingEl">7 DT</span>
          </div>
          <div class="checkout-summary-row grand">
            <span id="lblGrand">Total à payer</span>
            <span id="grandTotalEl">7 DT</span>
          </div>

          <div class="checkout-error" id="checkoutError"></div>
          <div id="checkoutStatus" style="font-weight: 600; margin: 8px 0"></div>

          <button type="submit" class="btn btn-primary" id="confirmBtn" style="width: 100%; margin-top: 12px">Confirmer</button>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-bottom" style="border-top:1px solid rgba(255,255,255,0.1); padding:20px 0;">GCA styMode — © <span id="year"></span> — Tous droits réservés</div>
    </div>
  </footer>

  <script type="module" src="js/checkout-page.js"></script>
